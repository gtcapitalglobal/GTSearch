<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔗 Links por Condado - GTSearch</title>
  <script src="/js/utils.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }

    /* ── Header ── */
    .header {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 1.4rem; color: #fff; }
    .header p  { font-size: 0.85rem; color: #94a3b8; margin-top: 2px; }
    .header-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }

    /* ── Buttons ── */
    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn-back    { background: rgba(255,255,255,0.1); color: #e0e0e0; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-success { background: #10b981; color: #fff; }
    .btn-warning { background: #f59e0b; color: #fff; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-sm      { padding: 5px 10px; font-size: 0.78rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .search-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 14px;
      color: #fff;
      font-size: 0.9rem;
      width: 260px;
    }
    .search-box::placeholder { color: #64748b; }
    .search-box:focus { outline: none; border-color: #3b82f6; }

    .filter-status {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 12px;
      color: #e0e0e0;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .stats-bar {
      margin-left: auto;
      display: flex;
      gap: 16px;
      font-size: 0.82rem;
    }
    .stat { display: flex; align-items: center; gap: 5px; }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-ok      { background: #10b981; }
    .dot-error   { background: #ef4444; }
    .dot-unknown { background: #64748b; }
    .dot-blocked { background: #f59e0b; }

    /* ── Table ── */
    .table-container {
      padding: 20px 24px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    thead th {
      background: rgba(59,130,246,0.2);
      color: #93c5fd;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid rgba(59,130,246,0.3);
      white-space: nowrap;
      position: sticky;
      top: 0;
    }
    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.04); }
    td {
      padding: 8px 12px;
      vertical-align: middle;
    }
    .county-name {
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      font-size: 0.85rem;
    }

    /* ── Link Cell ── */
    .link-cell {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 200px;
      max-width: 280px;
    }
    .link-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 5px 8px;
      color: #e0e0e0;
      font-size: 0.78rem;
      min-width: 0;
      transition: border-color 0.2s;
    }
    .link-input:focus { outline: none; border-color: #3b82f6; background: rgba(59,130,246,0.1); }
    .link-input.status-ok      { border-color: rgba(16,185,129,0.5); }
    .link-input.status-error   { border-color: rgba(239,68,68,0.5); }
    .link-input.status-blocked { border-color: rgba(245,158,11,0.5); }

    .status-icon {
      font-size: 0.9rem;
      cursor: pointer;
      flex-shrink: 0;
      title: "Testar link";
    }
    .status-icon:hover { transform: scale(1.2); }

    /* ── Status badge ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-ok      { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .badge-error   { background: rgba(239,68,68,0.2);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .badge-blocked { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .badge-unknown { background: rgba(100,116,139,0.2); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }

    /* ── Progress bar ── */
    .progress-bar {
      display: none;
      padding: 10px 24px;
      background: rgba(255,255,255,0.03);
    }
    .progress-track {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #10b981);
      border-radius: 4px;
      transition: width 0.3s;
    }
    .progress-label {
      font-size: 0.78rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.85rem;
      color: #e0e0e0;
      z-index: 9999;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      max-width: 360px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(16,185,129,0.5); }
    .toast.error   { border-color: rgba(239,68,68,0.5); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-box { width: 100%; }
      .stats-bar { margin-left: 0; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <h1>🔗 Links por Condado — Florida</h1>
    <p>67 condados · Appraisal · GIS · Clerks · Code Enforcement · Zoning</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-warning" onclick="testAllLinks()" id="btnTestAll">🧪 Testar Todos</button>
    <button class="btn btn-success" onclick="saveAllLinks()" id="btnSave">💾 Salvar Alterações</button>
    <button class="btn btn-primary" onclick="importFromCSV()">📥 Importar CSV</button>
    <a href="settings.html" class="btn btn-back">← Configurações</a>
  </div>
</div>

<!-- Progress bar -->
<div class="progress-bar" id="progressBar">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">Testando links...</div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <input type="text" class="search-box" id="searchInput" placeholder="🔍 Buscar condado..." oninput="filterTable()">
  <select class="filter-status" id="filterStatus" onchange="filterTable()">
    <option value="">Todos os status</option>
    <option value="ok">✅ OK</option>
    <option value="error">❌ Erro</option>
    <option value="blocked">⚠️ Bloqueado</option>
    <option value="unknown">⬜ Não testado</option>
  </select>
  <select class="filter-status" id="filterCategory" onchange="filterTable()">
    <option value="">Todas as categorias</option>
    <option value="appraisal">Property Appraiser</option>
    <option value="gis">GIS / Parcel Map</option>
    <option value="clerks">Clerks Office</option>
    <option value="code_enforcement">Code Enforcement</option>
    <option value="zoning">Planning & Zoning</option>
  </select>
  <button class="btn btn-sm btn-danger" onclick="resetToDefault()">🔄 Restaurar Padrão</button>
  <button class="btn btn-sm" style="background:#ef4444;color:#fff;" onclick="clearErrorLinks()" id="btnClearErrors" title="Apaga todos os links com status Erro (❌)">🗑️ Limpar Erros</button>
  <div class="stats-bar" id="statsBar">
    <span class="stat"><span class="stat-dot dot-ok"></span><span id="countOk">0</span> OK</span>
    <span class="stat"><span class="stat-dot dot-error"></span><span id="countError">0</span> Erro</span>
    <span class="stat"><span class="stat-dot dot-blocked"></span><span id="countBlocked">0</span> Bloqueado</span>
    <span class="stat"><span class="stat-dot dot-unknown"></span><span id="countUnknown">0</span> N/T</span>
  </div>
</div>

<!-- Table -->
<div class="table-container">
  <table id="linksTable">
    <thead>
      <tr>
        <th style="width:130px">Condado</th>
        <th>🏛️ Property Appraiser</th>
        <th>🗺️ GIS / Parcel Map</th>
        <th>📋 Clerks Office</th>
        <th>🚨 Code Enforcement</th>
        <th>🏗️ Planning & Zoning</th>
        <th style="width:80px">Ações</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="7"><div class="empty-state"><div class="icon">⏳</div>Carregando dados...</div></td></tr>
    </tbody>
  </table>
</div>

<!-- Hidden file input for CSV import -->
<input type="file" id="csvFileInput" accept=".csv" style="display:none" onchange="handleCSVImport(event)">

<!-- Toast -->
<div class="toast" id="toast"></div>

];

const STORAGE_KEY = 'countyLinksAdmin_v2';
const STATUS_KEY  = 'countyLinksStatus_v2';

const CATEGORIES = [
  { key: 'appraisal',       label: '🏛️ Property Appraiser' },
  { key: 'gis',             label: '🗺️ GIS / Parcel Map' },
  { key: 'clerks',          label: '📋 Clerks Office' },
  { key: 'code_enforcement',label: '🚨 Code Enforcement' },
  { key: 'zoning',          label: '🏗️ Planning & Zoning' }
];

let countyData = [];
let statusData = {};
let unsavedChanges = false;

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  countyData = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_COUNTY_LINKS));
  statusData = JSON.parse(localStorage.getItem(STATUS_KEY) || '{}');
  renderTable(countyData);
  updateStats();
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="icon">🔍</div>Nenhum condado encontrado</div></td></tr>';
    return;
  }
  tbody.innerHTML = data.map(item => {
    const c = item.county;
    const s = statusData[c] || {};
    return `<tr data-county="${c}">
      <td><div class="county-name">${c}</div></td>
      ${CATEGORIES.map(cat => {
        const url = item.links[cat.key] || '';
        const st  = s[cat.key] || 'unknown';
        const icon = statusIcon(st);
        const cls  = `status-${st}`;
        return `<td>
          <div class="link-cell">
            <input class="link-input ${cls}" 
                   data-county="${c}" data-cat="${cat.key}"
                   value="${escHtml(url)}" 
                   placeholder="https://..."
                   onchange="markChanged(this)"
                   title="${escHtml(url)}">
            <span class="status-icon" onclick="testSingleLink('${c}','${cat.key}')" title="Testar link">${icon}</span>
          </div>
        </td>`;
      }).join('')}
      <td>
        <button class="btn btn-sm btn-primary" onclick="openAllLinks('${c}')" title="Abrir todos os links do condado">🔗</button>
      </td>
    </tr>`;
  }).join('');
}

function statusIcon(st) {
  return { ok: '✅', error: '❌', blocked: '⚠️', unknown: '⬜' }[st] || '⬜';
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════════
function filterTable() {
  const search   = document.getElementById('searchInput').value.toLowerCase();
  const stFilter = document.getElementById('filterStatus').value;
  const catFilter= document.getElementById('filterCategory').value;

  let filtered = countyData.filter(item => {
    if (search && !item.county.toLowerCase().includes(search)) return false;
    if (stFilter) {
      const s = statusData[item.county] || {};
      const cats = catFilter ? [catFilter] : CATEGORIES.map(c=>c.key);
      const match = cats.some(k => (s[k]||'unknown') === stFilter);
      if (!match) return false;
    }
    return true;
  });

  renderTable(filtered);
}

// ═══════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════
function updateStats() {
  let ok=0, err=0, blk=0, unk=0;
  countyData.forEach(item => {
    const s = statusData[item.county] || {};
    CATEGORIES.forEach(cat => {
      const st = s[cat.key] || 'unknown';
      if (st==='ok') ok++;
      else if (st==='error') err++;
      else if (st==='blocked') blk++;
      else unk++;
    });
  });
  document.getElementById('countOk').textContent = ok;
  document.getElementById('countError').textContent = err;
  document.getElementById('countBlocked').textContent = blk;
  document.getElementById('countUnknown').textContent = unk;
}

// ═══════════════════════════════════════════════════════
// MARK CHANGED
// ═══════════════════════════════════════════════════════
function markChanged(input) {
  const county = input.dataset.county;
  const cat    = input.dataset.cat;
  const val    = input.value.trim();
  const item   = countyData.find(i => i.county === county);
  if (item) {
    item.links[cat] = val;
    // Reset status for this link
    if (!statusData[county]) statusData[county] = {};
    statusData[county][cat] = 'unknown';
    input.className = 'link-input status-unknown';
    const icon = input.nextElementSibling;
    if (icon) icon.textContent = '⬜';
  }
  unsavedChanges = true;
}

// ═══════════════════════════════════════════════════════
// TEST SINGLE LINK (via server proxy to avoid CORS)
// ═══════════════════════════════════════════════════════
async function testSingleLink(county, cat) {
  const item = countyData.find(i => i.county === county);
  if (!item) return;
  const url = item.links[cat];
  if (!url) { showToast('⬜ URL vazia', 'error'); return; }

  const row   = document.querySelector(`tr[data-county="${county}"]`);
  const input = row ? row.querySelector(`input[data-cat="${cat}"]`) : null;
  const icon  = input ? input.nextElementSibling : null;
  if (icon) icon.textContent = '⏳';

  const status = await checkUrl(url);
  if (!statusData[county]) statusData[county] = {};
  statusData[county][cat] = status;
  localStorage.setItem(STATUS_KEY, JSON.stringify(statusData));

  if (input) {
    input.className = `link-input status-${status}`;
  }
  if (icon) icon.textContent = statusIcon(status);
  updateStats();
  showToast(`${statusIcon(status)} ${county} · ${cat}: ${status.toUpperCase()}`, status === 'ok' ? 'success' : 'error');
}

// ═══════════════════════════════════════════════════════
// CHECK URL via server endpoint
// ═══════════════════════════════════════════════════════
async function checkUrl(url) {
  if (!url || !url.startsWith('http')) return 'unknown';
  try {
    const res = await fetch('/api/check-url', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
      signal: AbortSignal.timeout(12000)
    });
    const data = await res.json();
    if (data.status === 'ok')      return 'ok';
    if (data.status === 'blocked') return 'blocked';
    return 'error';
  } catch (e) {
    return 'error';
  }
}

// ═══════════════════════════════════════════════════════
// TEST ALL LINKS
// ═══════════════════════════════════════════════════════
async function testAllLinks() {
  const btn = document.getElementById('btnTestAll');
  btn.disabled = true;
  btn.textContent = '⏳ Testando...';

  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  progressBar.style.display = 'block';

  const allLinks = [];
  countyData.forEach(item => {
    CATEGORIES.forEach(cat => {
      if (item.links[cat.key]) {
        allLinks.push({ county: item.county, cat: cat.key, url: item.links[cat.key] });
      }
    });
  });

  const total = allLinks.length;
  let done = 0;

  // Process in batches of 5 to avoid overloading
  const BATCH = 5;
  for (let i = 0; i < allLinks.length; i += BATCH) {
    const batch = allLinks.slice(i, i + BATCH);
    await Promise.all(batch.map(async ({ county, cat, url }) => {
      const status = await checkUrl(url);
      if (!statusData[county]) statusData[county] = {};
      statusData[county][cat] = status;
      done++;
      const pct = Math.round((done / total) * 100);
      progressFill.style.width = pct + '%';
      progressLabel.textContent = `Testando... ${done}/${total} (${pct}%)`;
    }));
  }

  localStorage.setItem(STATUS_KEY, JSON.stringify(statusData));
  filterTable();
  updateStats();

  progressBar.style.display = 'none';
  btn.disabled = false;
  btn.textContent = '🧪 Testar Todos';
  showToast(`✅ Teste concluído: ${total} links verificados`, 'success');
}

// ═══════════════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════════════
function saveAllLinks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(countyData));
  localStorage.setItem(STATUS_KEY, JSON.stringify(statusData));
  unsavedChanges = false;
  showToast('💾 Links salvos com sucesso!', 'success');
}

// ═══════════════════════════════════════════════════════
// CLEAR ERROR LINKS
// ═══════════════════════════════════════════════════════
function clearErrorLinks() {
  // Count how many error links exist
  let count = 0;
  countyData.forEach(item => {
    CATEGORIES.forEach(cat => {
      const st = statusData[item.county] && statusData[item.county][cat.key];
      if (st === 'error' && item.links[cat.key]) count++;
    });
  });

  if (count === 0) {
    showToast('ℹ️ Nenhum link com erro encontrado. Execute "Testar Todos" primeiro.', 'info');
    return;
  }

  if (!confirm(`Apagar ${count} link(s) com status ❌ Erro? Esta ação não pode ser desfeita.`)) return;

  let cleared = 0;
  countyData.forEach(item => {
    CATEGORIES.forEach(cat => {
      const st = statusData[item.county] && statusData[item.county][cat.key];
      if (st === 'error' && item.links[cat.key]) {
        item.links[cat.key] = '';
        // Remove status entry
        if (statusData[item.county]) delete statusData[item.county][cat.key];
        cleared++;
      }
    });
  });

  // Save immediately
  localStorage.setItem(STORAGE_KEY, JSON.stringify(countyData));
  localStorage.setItem(STATUS_KEY, JSON.stringify(statusData));
  unsavedChanges = false;

  filterTable();
  updateStats();
  showToast(`🗑️ ${cleared} link(s) com erro removidos e salvos.`, 'success');
}

// ═══════════════════════════════════════════════════════
// OPEN ALL LINKS FOR COUNTY
// ═══════════════════════════════════════════════════════
function openAllLinks(county) {
  const item = countyData.find(i => i.county === county);
  if (!item) return;
  CATEGORIES.forEach(cat => {
    if (item.links[cat.key]) window.open(item.links[cat.key], '_blank');
  });
}

// ═══════════════════════════════════════════════════════
// RESET TO DEFAULT
// ═══════════════════════════════════════════════════════
function resetToDefault() {
  if (!confirm('Restaurar todos os links para os valores padrão? Suas edições serão perdidas.')) return;
  countyData = JSON.parse(JSON.stringify(DEFAULT_COUNTY_LINKS));
  statusData = {};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(countyData));
  localStorage.setItem(STATUS_KEY, JSON.stringify(statusData));
  renderTable(countyData);
  updateStats();
  showToast('🔄 Links restaurados para o padrão', 'success');
}

// ═══════════════════════════════════════════════════════
// CSV IMPORT
// ═══════════════════════════════════════════════════════
function importFromCSV() {
  document.getElementById('csvFileInput').click();
}

function handleCSVImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const lines = e.target.result.split('\n');
      let imported = 0;
      lines.forEach(line => {
        if (!line.trim()) return;
        const cols = parseCSVLine(line);
        const county = (cols[0]||'').trim().toUpperCase();
        if (!county || county === 'CONDADOS') return;
        const existing = countyData.find(i => i.county === county);
        const links = {
          appraisal:        (cols[2]||'').trim(),
          gis:              (cols[3]||'').trim(),
          clerks:           (cols[4]||'').trim(),
          code_enforcement: (cols[5]||'').trim(),
          zoning:           (cols[6]||'').trim()
        };
        if (existing) {
          Object.assign(existing.links, links);
        } else {
          countyData.push({ county, links });
        }
        imported++;
      });
      renderTable(countyData);
      updateStats();
      showToast(`📥 ${imported} condados importados do CSV`, 'success');
    } catch(err) {
      showToast('❌ Erro ao importar CSV: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (ch === '"') inQ = false;
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { result.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
  }
  result.push(cur.trim());
  return result;
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 3500);
}

// ═══════════════════════════════════════════════════════
// WARN ON UNSAVED
// ═══════════════════════════════════════════════════════
window.addEventListener('beforeunload', e => {
  if (unsavedChanges) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ── START ──
init();
